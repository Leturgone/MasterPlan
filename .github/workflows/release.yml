name: Android Release
on:
  push:
    branches:
      - dev/add-apk-build-ci-cd
jobs:
  buid:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6.0.2

      - name: Checkout keystore repo
        uses: actions/checkout@v6.0.2
        with:
          repository: ${{ secrets.KEYSTORE_GIT_REPOSITORY }}
          token: ${{ secrets.KEYSTORE_REPOSITORY_TOKEN }}
          path: app/keystore

      - name: Generate keys.kt
        env:
          API_URL: ${{ secrets.API_URL_SECRET }}
          WEBSOCKET_URL: ${{ secrets.WEBSOCKET_URL_SECRET }}
        run: |
          mkdir -p app/src/main/java/com/app/masterplan/di
          cat > app/src/main/java/com/app/masterplan/di/keys.kt << EOF
          package com.app.masterplan.di
          
          const val API_URL = "$API_URL"
          
          EOF
          
          mkdir -p app/src/main/java/com/app/masterplan/framework/websocket
          cat > app/src/main/java/com/app/masterplan/framework/websocket/keys.kt << EOF
          package com.app.masterplan.framework.websocket
          
          const val WEBSOCKET_URL = "WEBSOCKET_URL"
          
          EOF
          

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: 17

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Clean project
        run: ./gradlew clean

      - name: Build with Gradle
        run: ./gradlew build


      - name: Sign APK
        env:
          KEYSTORE_PATH: app/keystore/keystore.jks
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          RELEASE_SIGN_KEY_ALIAS: ${{ secrets.RELEASE_SIGN_KEY_ALIAS }}
          RELEASE_SIGN_KEY_PASSWORD: ${{ secrets.RELEASE_SIGN_KEY_PASSWORD }}
        run: |
          ./gradlew assembleRelease --stacktrace --info
          jarsigner -verbose -sigalg SHA256withRSA -digestalg SHA-256 \
          -keystore "$KEYSTORE_PATH" \
          -storepass "$KEYSTORE_PASSWORD" \
          -keypass "$RELEASE_SIGN_KEY_PASSWORD" \
          app/build/outputs/apk/release/app-release-unsigned.apk "$RELEASE_SIGN_KEY_ALIAS"
          zipalign -v 4 \
          app/build/outputs/apk/release/app-release-unsigned.apk \
          app/build/outputs/apk/release/app-release.apk

      - name: Upload APK
        uses: actions/upload-artifact@v7.0.1
        with:
          name: app-release.apk
          path: app/build/outputs/apk/release/app-release.apk