name: Android Release
on:
  push:
    branches:
      - dev/add-apk-build-ci-cd
jobs:
  buid:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6.0.2

      - name: Checkout keystore repo
        uses: actions/checkout@v6.0.2
        with:
          repository: ${{ secrets.KEYSTORE_GIT_REPOSITORY }}
          token: ${{ secrets.KEYSTORE_REPOSITORY_TOKEN }}
          path: app/keystore

      - name: Set up JDK 11
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: 11

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build with Gradle
        run: ./gradlew build


      - name: Sign APK
        env:
          KEYSTORE_PATH: app/keystore
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          RELEASE_SIGN_KEY_ALIAS: ${{ secrets.RELEASE_SIGN_KEY_ALIAS }}
          RELEASE_SIGN_KEY_PASSWORD: ${{ secrets.RELEASE_SIGN_KEY_PASSWORD }}
        run: |
          ./gradlew assembleRelease 
          jarsigner -verbose -sigalg SHA256withRSA -digestalg SHA-256 \
          -keystore "$KEYSTORE_PATH" \
          -storepass "$KEYSTORE_PASSWORD" \
          -keypass "$RELEASE_SIGN_KEY_PASSWORD" \
          app/build/outputs/apk/release/app-release-unsigned.apk "$RELEASE_SIGN_KEY_ALIAS"
          zipalign -v 4 \
          app/build/outputs/apk/release/app-release-unsigned.apk \
          app/build/outputs/apk/release/app-release.apk

      - name: Upload APK
        uses: actions/upload-artifact@v7.0.1
        with:
          name: app-release.apk
          path: app/build/outputs/apk/release/app-release.apk